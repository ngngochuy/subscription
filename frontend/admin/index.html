<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Panel — SubTrack</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">S</div>
      <span class="brand-name">Sub<em>Track</em></span>
      <span style="font-size:9px;font-weight:700;padding:2px 7px;background:var(--amber-soft);color:var(--amber);border-radius:4px;margin-left:6px;letter-spacing:.06em">ADMIN</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-link active" data-view="overview">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span>Tổng quan</span>
      </button>
      <button class="nav-link" data-view="upgrades">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span>Yêu cầu Nâng cấp</span>
      </button>
      <button class="nav-link" data-view="users">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Quản lý người dùng</span>
      </button>
      <button class="nav-link" data-view="allsubs">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Tất cả gói đăng ký</span>
      </button>
      <button class="nav-link" data-view="analytics">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Thống kê hệ thống</span>
      </button>
      <button class="nav-link" data-view="actlog">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Nhật ký hoạt động</span>
      </button>
      <div class="nav-sep"></div>
      <button class="nav-link" data-view="config">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Cấu hình hệ thống</span>
      </button>
      <button class="nav-link" data-view="tiers">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span>Gói dịch vụ (Tiers)</span>
      </button>
      <a href="/client/index.html" class="nav-link" style="text-decoration:none">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span>Dashboard Client</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="adminAvatar">A</div>
        <div class="user-details">
          <div class="name" id="adminName">Admin</div>
          <div class="role">Quản trị viên</div>
        </div>
        <button class="icon-btn-sm" id="logoutBtn" title="Đăng xuất" style="margin-left:auto">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-panel">
    <header class="topbar">
      <div class="topbar-left"><h1 id="pageTitle">Tổng quan hệ thống</h1></div>
      <div class="topbar-right">
        <span style="font-size:11px;color:var(--text-muted)" id="lastUpdate">—</span>
        <button class="btn btn-ghost btn-sm" onclick="loadAll()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Làm mới
        </button>
      </div>
    </header>

    <div class="page-body">
      <!-- OVERVIEW -->
      <div class="view-section active" id="viewOverview"></div>
      <!-- USERS -->
      <div class="view-section" id="viewUsers"></div>
      <!-- ALL SUBS -->
      <div class="view-section" id="viewAllsubs"></div>
      <!-- ANALYTICS -->
      <div class="view-section" id="viewAnalytics"></div>
      <!-- CONFIG -->
      <div class="view-section" id="viewConfig"></div>
      <!-- TIERS -->
      <div class="view-section" id="viewTiers"></div>
      <!-- ACTIVITY LOG -->
      <div class="view-section" id="viewActlog"></div>
      <!-- UPGRADE REQUESTS -->
      <div class="view-section" id="viewUpgrades"></div>
    </div>
  </div>
</div>

<!-- MODAL: View user subs -->
<div class="modal" id="userSubsModal">
  <div class="modal-box modal-box--wide">
    <div class="modal-head">
      <h2><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg> <span id="userSubsTitle">Gói đăng ký</span></h2>
      <button class="modal-close" onclick="closeModal('userSubsModal')">&times;</button>
    </div>
    <div class="modal-body" id="userSubsBody"></div>
  </div>
</div>

<div id="toast" class="toast">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <span id="toastMsg"></span>
</div>

<script src="admin.js"></script>
</body>
</html>
