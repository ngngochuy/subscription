<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Đăng nhập — SubTrack</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="brand-mark">S</div>
      <span class="brand-name">Sub<em>Track</em></span>
    </div>
    <h1 class="auth-title">Chào mừng trở lại</h1>
    <p class="auth-sub">Đăng nhập để quản lý gói đăng ký của bạn</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Tên đăng nhập / Email / Số điện thoại</label>
        <input type="text" id="username" placeholder="Username, email hoặc số điện thoại..." required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu..." required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">Đăng nhập</button>
    </form>

    <!-- Verify notice (hidden by default) -->
    <div id="verifyNotice" style="display:none;margin-top:16px;background:var(--amber-soft, rgba(245,158,11,.12));border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:14px 16px;text-align:center">
      <p style="font-size:13px;color:var(--amber, #f59e0b);font-weight:600;margin-bottom:8px">Tài khoản chưa được xác thực</p>
      <p style="font-size:12px;color:var(--text-muted, #5c5c6a);margin-bottom:12px">Kiểm tra email <strong id="verifyEmail" style="color:var(--text, #ededf0)">—</strong> và bấm link xác thực.</p>
      <button class="btn-submit" id="resendBtn" style="font-size:12px;padding:8px 16px">Gửi lại email xác thực</button>
      <div id="resendStatus" style="font-size:11px;margin-top:6px;min-height:16px"></div>
    </div>

    <p class="auth-foot">Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a></p>
  </div>
  <div id="toast" class="toast"><span id="toastMsg"></span></div>
  <script>
    let pendingEmail = '';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Đang xử lý...';

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (d.success) {
          toast('Đăng nhập thành công!');
          document.getElementById('verifyNotice').style.display = 'none';
          setTimeout(() => {
            window.location.href = d.user.role === 'admin' ? '/admin/index.html' : '/client/index.html';
          }, 500);
        } else if (d.needVerify) {
          pendingEmail = d.email || '';
          document.getElementById('verifyNotice').style.display = 'block';
          document.getElementById('verifyEmail').textContent = pendingEmail;
          toast(d.error);
          btn.disabled = false; btn.textContent = 'Đăng nhập';
        } else {
          toast(d.error || 'Sai thông tin đăng nhập');
          btn.disabled = false; btn.textContent = 'Đăng nhập';
        }
      } catch {
        toast('Lỗi kết nối server');
        btn.disabled = false; btn.textContent = 'Đăng nhập';
      }
    });

    document.getElementById('resendBtn').addEventListener('click', async () => {
      if (!pendingEmail) return toast('Không có email. Hãy đăng nhập lại.');
      const btn = document.getElementById('resendBtn');
      const status = document.getElementById('resendStatus');
      btn.disabled = true; btn.textContent = 'Đang gửi...';
      try {
        const r = await fetch('/api/resend-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail })
        });
        const d = await r.json();
        status.innerHTML = d.success
          ? '<span style="color:var(--green, #22c55e)">Đã gửi lại email xác thực</span>'
          : '<span style="color:var(--red, #ef4444)">' + (d.error || d.message) + '</span>';
      } catch {
        status.innerHTML = '<span style="color:var(--red, #ef4444)">Lỗi kết nối</span>';
      }
      btn.disabled = false; btn.textContent = 'Gửi lại email xác thực';
    });

    function toast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show');
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
